name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -storepass pincer123 \
            -alias pincerkey \
            -keypass pincer123 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Pincer Mobile,O=Claw Works,C=CN"

      - name: Build release APK (JS bundled)
        run: |
          cd android
          chmod +x gradlew
          KEYSTORE_FILE=release.keystore \
          KEYSTORE_PASSWORD=pincer123 \
          KEY_ALIAS=pincerkey \
          KEY_PASSWORD=pincer123 \
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=pincer123 \
            -Pandroid.injected.signing.key.alias=pincerkey \
            -Pandroid.injected.signing.key.password=pincer123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pincer-mobile-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
